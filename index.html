<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base44 Test Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1 {
            color: #003366;
        }

        .calculator {
            margin-top: 40px;
            border: 2px dashed #0070f3;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background: #fafafa;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Base44 Test Website</h1>

    <p>
        This website is used to test embedding Base44 applications before
        adding them to the real company website.
    </p>

    <div class="calculator">
        
       <iframe
    src="https://eor-calculator-blush.vercel.app"
    width="100%"
    height="1100"
    style="
        border: none;
        border-radius: 12px;
        background: white;
    "
    loading="lazy"
    title="Blue Lynx EOR Calculator">
</iframe>

    </div>
</div>

</body>
</html>
