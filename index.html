<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base44 Test Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1 {
            color: #003366;
        }

.calculator {
    margin-top: 40px;
}

.calculator-right {
    display: flex;
    justify-content: flex-end;
}

.calculator-right {
    position: fixed;
    top: 90px;
    right: 30px;
    width: 420px;
    height: 620px;
    z-index: 1000;
}

.calculator-right iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 12px;
    background: white;
    box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
}
    </style>
</head>
<body>

<div class="container">
    <h1>Base44 Test Website</h1>

    <p>
        This website is used to test embedding Base44 applications before
        adding them to the real company website.
    </p>

<div class="calculator-right">
    <iframe
        src="https://eor-calculator-blush.vercel.app"
        title="Blue Lynx EOR Calculator"
        loading="lazy">
    </iframe>
</div>
    
</div>

</body>
</html>
